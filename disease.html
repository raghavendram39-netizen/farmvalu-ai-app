<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Disease Detection - FarmValu AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌾 Crop Disease Detection</h1>
    <p>Upload a crop image and let AI analyze it.</p>
</header>

<div class="container">

    <div class="card">
        <h2>📷 Upload Crop Image</h2>

        <input type="file" id="imageUpload" accept="image/*">

        <br><br>

        <img id="preview" src="" style="display:none;max-width:100%;border-radius:10px;">

        <br><br>

        <button onclick="detectDisease()">
            Detect Disease
        </button>

        <div id="result" style="margin-top:25px;display:none;">
            <h3>AI Analysis Result</h3>

            <p><strong>Disease:</strong> <span id="diseaseName"></span></p>

            <p><strong>Confidence:</strong> <span id="confidence"></span></p>

            <p><strong>Treatment:</strong> <span id="treatment"></span></p>

            <p><strong>Recommended Fertilizer:</strong> <span id="fertilizer"></span></p>
        </div>

    </div>

</div>

<script>
const imageUpload = document.getElementById("imageUpload");

imageUpload.onchange = function () {
    const file = this.files[0];

    if (file) {
        document.getElementById("preview").src = URL.createObjectURL(file);
        document.getElementById("preview").style.display = "block";
    }
};

function detectDisease() {

    const diseases = [
        {
            name: "Healthy Plant",
            confidence: "98%",
            treatment: "No disease detected.",
            fertilizer: "NPK 19-19-19"
        },
        {
            name: "Leaf Spot",
            confidence: "95%",
            treatment: "Spray Copper Fungicide.",
            fertilizer: "DAP + Micronutrients"
        },
        {
            name: "Powdery Mildew",
            confidence: "96%",
            treatment: "Apply Sulfur Fungicide.",
            fertilizer: "Potash Rich Fertilizer"
        },
        {
            name: "Bacterial Blight",
            confidence: "93%",
            treatment: "Use Copper Oxychloride Spray.",
            fertilizer: "Balanced NPK"
        }
    ];

    const result = diseases[Math.floor(Math.random() * diseases.length)];

    document.getElementById("result").style.display = "block";
    document.getElementById("diseaseName").innerHTML = result.name;
    document.getElementById("confidence").innerHTML = result.confidence;
    document.getElementById("treatment").innerHTML = result.treatment;
    document.getElementById("fertilizer").innerHTML = result.fertilizer;
}
</script>

</body>
</html>
