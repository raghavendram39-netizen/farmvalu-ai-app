<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmValu AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url("splash.jpg") center center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.overlay{
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:30px;
}

.loading{
width:280px;
height:12px;
background:#ffffff55;
border-radius:30px;
overflow:hidden;
}

.bar{
height:100%;
background:#4CAF50;
width:0%;
animation:load 2s linear forwards;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}
</style>

<script>
setTimeout(function(){
window.location.href="home.html";
},2000);
</script>

</head>

<body>

<div class="overlay">

<h1>🌾 FarmValu AI</h1>

<p>Smart Farming Powered by AI</p>

<div class="loading">
<div class="bar"></div>
</div>

<br>

<h3>Loading...</h3>

</div>

</body>
</html>
